<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0A0A0A;
      font-family: 'Inter', sans-serif;
      color: #F5F0E8;
      position: relative;
    }

    /* Grain */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: overlay;
    }

    .inner {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 72px 60px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .eyebrow-line {
      width: 40px;
      height: 1.5px;
      background: #B8963E;
    }
    .eyebrow-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #B8963E;
    }

    .name {
      font-size: 118px;
      line-height: 0.92;
      letter-spacing: -0.04em;
      margin-bottom: 36px;
    }
    .name-bold { font-weight: 800; display: block; }
    .name-light { font-weight: 300; display: block; }
    .name-dot { color: #B8963E; }

    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.15);
      margin-bottom: 32px;
    }

    .bottom {
      display: flex;
      align-items: flex-end;
      gap: 80px;
    }

    .desc {
      flex: 1;
      font-size: 17px;
      font-weight: 300;
      line-height: 1.65;
      color: rgba(245,240,232,0.6);
      max-width: 520px;
    }

    .stats {
      display: flex;
      gap: 20px;
      flex-shrink: 0;
    }

    .stat-card {
      background: rgba(245,240,232,0.05);
      border: 1px solid rgba(245,240,232,0.1);
      border-radius: 16px;
      padding: 24px 32px;
      min-width: 160px;
    }

    .stat-value {
      font-size: 38px;
      font-weight: 700;
      color: #B8963E;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 400;
      color: rgba(245,240,232,0.45);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="inner">
    <div class="eyebrow">
      <span class="eyebrow-line"></span>
      <span class="eyebrow-label">Lifecycle &amp; Retention Marketer</span>
    </div>
    <div class="name">
      <span class="name-bold">Asad</span>
      <span class="name-light">Hussain<span class="name-dot">.</span></span>
    </div>
    <div class="divider"></div>
    <div class="bottom">
      <p class="desc">Building high-LTV, data-informed, customer-first lifecycle marketing programs — from acquisition to long-term brand loyalty.</p>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value">$65M+</div>
          <div class="stat-label">in attributable<br>revenue impact</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">17<br>YRS</div>
          <div class="stat-label">of craft<br>excellence</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
